[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --no-header
timeout = 60
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
markers =
    unit: Pure unit tests, no DB or network
    integration: Requires running PostgreSQL (port 5433)
    multilingual: Tests for non-English AI extraction
    stress: Volume/load tests
    ai: Calls real Gemini API
    e2e: Full lifecycle tests
    live: Requires a live backend server on localhost:8080
